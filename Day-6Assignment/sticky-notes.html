<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        #noteInput {
            padding: 15px;
            font-size: 16px;
            width: 300px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        #addBtn {
            padding: 15px 30px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #addBtn:hover {
            background-color: #45a049;
        }

        .notes-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .note {
            width: 250px;
            min-height: 150px;
            padding: 20px;
            background: linear-gradient(145deg, #fff9c4, #ffecb3);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .note:nth-child(3n+2) {
            background: linear-gradient(145deg, #c8e6c9, #a5d6a7);
        }

        .note:nth-child(3n) {
            background: linear-gradient(145deg, #bbdefb, #90caf9);
        }

        .note-text {
            font-size: 16px;
            color: #333;
            word-wrap: break-word;
        }

        .note-buttons {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .edit-btn, .delete-btn {
            padding: 5px 10px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .edit-btn {
            background-color: #2196F3;
            color: white;
        }

        .edit-btn:hover {
            background-color: #0b7dda;
        }

        .delete-btn {
            background-color: #f44336;
            color: white;
        }

        .delete-btn:hover {
            background-color: #da190b;
        }

        .edit-input {
            width: 90%;
            height: 80px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }

        .save-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        .empty-message {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Sticky Notes</h1>
    
    <div class="input-container">
        <input type="text" id="noteInput" placeholder="Enter your note here...">
        <button id="addBtn" onclick="addNote()">Add Note</button>
    </div>

    <div class="notes-container" id="notesContainer">
        <p class="empty-message" id="emptyMessage">No notes yet. Add your first note above!</p>
    </div>

    <script>
        var notes = [];

        function loadNotes() {
            var savedNotes = localStorage.getItem('stickyNotes');
            if (savedNotes) {
                notes = JSON.parse(savedNotes);
            }
            displayNotes();
        }

        // Save notes to localStorage
        function saveNotes() {
            localStorage.setItem('stickyNotes', JSON.stringify(notes));
        }

        // Display all notes
        function displayNotes() {
            var container = document.getElementById('notesContainer');
            var emptyMessage = document.getElementById('emptyMessage');
            
            // Clear current notes (except empty message)
            container.innerHTML = '';
            
            if (notes.length === 0) {
                container.innerHTML = '<p class="empty-message">No notes yet. Add your first note above!</p>';
                return;
            }
            
            for (var i = 0; i < notes.length; i++) {
                var noteDiv = document.createElement('div');
                noteDiv.className = 'note';
                
                var textSpan = document.createElement('span');
                textSpan.className = 'note-text';
                textSpan.id = 'noteText' + i;
                textSpan.textContent = notes[i];
                
                var buttonsDiv = document.createElement('div');
                buttonsDiv.className = 'note-buttons';
                
                var editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = 'Edit';
                editBtn.onclick = function(index) {
                    return function() {
                        editNote(index);
                    };
                }(i);
                
                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = function(index) {
                    return function() {
                        deleteNote(index);
                    };
                }(i);
                
                buttonsDiv.appendChild(editBtn);
                buttonsDiv.appendChild(deleteBtn);
                
                noteDiv.appendChild(textSpan);
                noteDiv.appendChild(buttonsDiv);
                container.appendChild(noteDiv);
            }
        }

        // Add a new note
        function addNote() {
            var input = document.getElementById('noteInput');
            var noteText = input.value.trim();
            
            if (noteText === '') {
                alert('Please enter a note!');
                return;
            }
            
            notes.push(noteText);
            saveNotes();
            displayNotes();
            input.value = '';
        }

        // Delete a note
        function deleteNote(index) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes.splice(index, 1);
                saveNotes();
                displayNotes();
            }
        }

        // Edit a note
        function editNote(index) {
            var noteText = document.getElementById('noteText' + index);
            var currentText = notes[index];
            
            // Create textarea for editing
            var textarea = document.createElement('textarea');
            textarea.className = 'edit-input';
            textarea.value = currentText;
            
            // Create save button
            var saveBtn = document.createElement('button');
            saveBtn.className = 'save-btn';
            saveBtn.textContent = 'Save';
            saveBtn.onclick = function() {
                var newText = textarea.value.trim();
                if (newText === '') {
                    alert('Note cannot be empty!');
                    return;
                }
                notes[index] = newText;
                saveNotes();
                displayNotes();
            };
            
            // Create cancel button
            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'save-btn';
            cancelBtn.style.backgroundColor = '#666';
            cancelBtn.style.marginLeft = '5px';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = function() {
                displayNotes();
            };
            
            // Replace note content with textarea
            noteText.innerHTML = '';
            noteText.appendChild(textarea);
            noteText.appendChild(saveBtn);
            noteText.appendChild(cancelBtn);
        }

        // Allow adding note with Enter key
        document.getElementById('noteInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addNote();
            }
        });

        // Load notes when page loads
        loadNotes();
    </script>
</body>
</html>
