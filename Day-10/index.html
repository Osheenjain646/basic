<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>Gemini AI Chat</title>
</head>
<body>
    <header id="header-section">
        <div id="container">
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <div style="font-size: 2rem;">🤖</div>
                <h1>Gemini AI Chat</h1>
            </div>
        </div>
    </header>

    <section id="response-section">
        <div id="messages">
            <div class="welcome-message">
                <div style="display: flex; align-items: center; gap: 0.75rem; max-width: 70%;">
                    <div class="avatar">🤖</div>
                    <div>
                        <h3 style="margin: 0 0 0.25rem 0; color: var(--text);">Gemini</h3>
                        <p style="margin: 0; color: var(--text-muted);">Hi! Ask me anything. I'm powered by Google Gemini AI.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="user-section">
        <div id="input-section">
            <input type="text" placeholder="Ask me anything..." id="input-search">
            <button id="send-btn">Send ➤</button>
            <button id="clear-btn" title="Clear chat">🗑️</button>
        </div>
    </section>

    <footer id="footer">
        <p>Powered by <a href="https://gemini.google.com" style="color: var(--primary);">Google Gemini</a> | All rights reserved</p>
        <script src="index.js" defer></script>
    </footer>
</body>
</html>
