<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      h1 {
        color: white;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        font-size: 2.5rem;
      }

      #btn {
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #667eea;
        background: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        margin-bottom: 40px;
      }

      #btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }

      #btn:active {
        transform: translateY(0);
      }

      .container {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 1200px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        min-width: 200px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        color: #333;
        font-size: 1.3rem;
        font-weight: 600;
        line-height: 1.6;
      }

      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      .card:first-child {
        border-top: 5px solid #ff6b6b;
      }

      .card:nth-child(2) {
        border-top: 5px solid #4ecdc4;
      }

      .card:nth-child(3) {
        border-top: 5px solid #45b7d1;
      }
    </style>
  </head>

  <body>
    <h1>Weather Dashboard</h1>

    <button id="btn">Get Weather</button>

    <div class="container">
      <div class="card" id="delhi">Delhi</div>
      <div class="card" id="mumbai">Mumbai</div>
      <div class="card" id="bangalore">Bangalore</div> 
    </div>
  </body>
  <script>
    const btn = document.getElementById("btn");

    btn.addEventListener("click", getWeather);

    function getWeather() {
      const delhi = fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=28.61&longitude=77.23&current_weather=true",
      );
      const mumbai = fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=19.07&longitude=72.87&current_weather=true",
      );
      const bangalore = fetch(
        "https://api.open-meteo.com/v1/forecast?latitude=12.97&longitude=77.59&current_weather=true",
      );

      Promise.all([delhi, mumbai, bangalore]) 
        .then((responses) => {
          return Promise.all(responses.map((res) => res.json()));
        })
        .then((data) => {
          const [delhiData, mumbaiData, bangaloreData] = data;

          document.getElementById("delhi").innerHTML =
            `Delhi <br> 🌡 ${delhiData.current_weather.temperature}°C`;

          document.getElementById("mumbai").innerHTML =
            `Mumbai <br> 🌡 ${mumbaiData.current_weather.temperature}°C`;

          document.getElementById("bangalore").innerHTML =
            `Bangalore <br> 🌡 ${bangaloreData.current_weather.temperature}°C`;
        })
        .catch((err) => {
          console.log("Error:", err);
        });
    }
  </script>
</html>
